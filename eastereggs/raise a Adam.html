<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document</title>
		<style>
			#adam {
				background-color: #adadad;
				width: 64px;
				height: 100px;
				padding: 1%;
			}
		</style>
	</head>
	<body>
		<p id="tiempo"><span id="fechaG"></span> |*| <span id="horaG"></span></p>
		<p>Este es Adam chiquito, trátalo bien.</p>
		<div id="adam"></div>
		<a href="../index.html">Volver a la página principal</a>
	</body>
		<script>
			let adamsito = document.querySelector("#adam");
			let estadoEmoci = ['Normal', 'Feliz', 'Triste', 'Enojado', 'Mareado', 'Dormido', 'Inconsciente', 'Muerto', 'Dormido'];
			let minimo = -100;
			let maximo = 100;
			class OC{
				constructor(nombre, varName, color, edad, dia, mes, altura, peso, hambre, energia, estado, estabMent) {
					this.nombre = nombre;
					this.varName = varName;
					this.color = color;
					this.edad = edad;
					this.dia = dia;
					this.mes = mes;
					this.cumpleanios = `${dia}/${mes}`
					this.altura = `${altura}cm`;
					this.peso = `${peso}kg`
					this.hambre = hambre;
					this.energia = energia;
					this.estado = estadoEmoci[estado];
					this.estabMent = estabMent;
				}
			}
			let adamC = new OC('Adam', 'adamC', '#ffcf00', 9, 16, 7, 125, 32.81, 20, 80, 0);
			adamsito.style.backgroundColor = adamC.color;
			let meses = ["Janisra", "Fellastrea", "Malyya", "Linyaser", "Meiryla", "Junsyer", "Qynryos", "Nyndia", "Precyd", "Ophyra", "Idrilio", "Elistrae", "Hasikira", "Cersylio", "Estelyst"];
			let meses32 = [1, 3, 5, 7, 9, 11, 13, 15];
			let meses33 = [2, 4, 6, 8, 10, 12, 14];

			let tiem = 1000;
			let timeGame;

			let seg = 0;
			let min = 0;
			let hor = 0;
			let dia = 1;

			let segGame  = ("0" + seg).slice(-2);
			let minGame  = ("0" + min).slice(-2);
			let horGame  = ("0" + hor).slice(-2);
			let diaGame  = ("0" + dia).slice(-2);
			let mesGame  = 0;
			let anioGame = 3045;

			let hora  = document.querySelector("#horaG");
			let fecha = document.querySelector("#fechaG");

			let fast   = document.querySelector("#bFlash");
			let normal = document.querySelector("#bNormal");
			let playP  = document.querySelector("#bPausa");

			let oc = document.querySelector("#char");

			let ocChat = document.querySelector("#chat");
			let dialog = document.createElement('p');
			let texto;

			hora.textContent = `${horGame}:${minGame}:${segGame}`;
			fecha.textContent = `${diaGame} / ${meses[mesGame]} / ${anioGame}`;

			function tiempo(){
				timeGame = setInterval( ()=> {
					seg++;
					if(seg >= 60){
						min++;
						seg = 0;
					} else if(min >= 60){
						hor++;
						min = 0;
						seg = 0;
					} else if(hor >= 30){
						dia++;
						hor = 0;
						min = 0;
						seg = 0;
					} else if (meses32.includes(mesGame) && dia >= 32) {
						mesGame++;
						dia = 0;
						hor = 0;
						min = 0;
						seg = 0;
					} else if (meses33.includes(mesGame) && dia >= 33) {
						mesGame++;
						dia = 0;
						hor = 0;
						min = 0;
						seg = 0;
					} else if(mesGame >= 15){
						anioGame++;
						mesGame = 0;
						dia = 0;
						hor = 0;
						min = 0;
						seg = 0;
					};
					segGame  = ("0" + seg).slice(-2);
					minGame  = ("0" + min).slice(-2);
					horGame  = ("0" + hor).slice(-2);
					diaGame  = ("0" + dia).slice(-2);
					hora.textContent = `${horGame}:${minGame}:${segGame}`;
					fecha.textContent = `${diaGame} / ${meses[mesGame]} / ${anioGame}`
				}, tiem);
			};

			tiempo();
		</script>
</html>
